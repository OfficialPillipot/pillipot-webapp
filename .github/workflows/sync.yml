name: Notify Fork Sync

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger fork sync workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.UPSTREAM_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/OfficialPillipot/pillipot-webapp/dispatches \
            -d '{"event_type":"sync-from-upstream"}'
