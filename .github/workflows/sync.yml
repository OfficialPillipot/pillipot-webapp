# ──────────────────────────────────────────────────────────────
# Sync Fork with Upstream
#
# Keeps this fork in sync with the upstream repository.
# Only pushes when there are real upstream changes,
# which triggers Vercel deployment automatically.
# ──────────────────────────────────────────────────────────────

name: Sync Fork with Upstream

on:
  # Run every 5 minutes
  schedule:
    - cron: "*/5 * * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    name: Sync upstream → fork
    runs-on: ubuntu-latest

    # Required so the workflow can push to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout the fork ──────────────────────────────
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can compare commits
          fetch-depth: 0
          # Use the default GITHUB_TOKEN for push access
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Configure git identity ─────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 3. Add upstream remote ──────────────────────────
      # Hardcoded to ensure reliability
      - name: Add upstream and fetch
        run: |
          UPSTREAM_URL="https://github.com/ginilmathew/pillipot-webapp.git"
          
          # Construct authenticated URL using the UPSTREAM_TOKEN secret for push access
          AUTH_UPSTREAM="https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/ginilmathew/pillipot-webapp.git"
          
          echo "Syncing with: $UPSTREAM_URL"
          git remote add upstream "$AUTH_UPSTREAM"
          git fetch upstream main --quiet

      # ── 4. Compare upstream with local ─────────────────────
      # Check if upstream has new commits that fork doesn't have
      - name: Check for upstream changes
        id: check
        run: |
          LOCAL_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse upstream/main)

          echo "local_sha=$LOCAL_SHA"
          echo "upstream_sha=$UPSTREAM_SHA"

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "✅ Fork is already up-to-date with upstream."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            # Count how many new commits upstream has
            NEW_COMMITS=$(git rev-list HEAD..upstream/main --count)
            echo "🔄 Upstream has $NEW_COMMITS new commit(s) to sync."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Sync only if there are changes ──────────────────
      # Rebase local main on top of upstream/main and push
      - name: Pull upstream changes and push to fork
        if: steps.check.outputs.has_changes == 'true'
        run: |
          echo "⬇️  Merging upstream/main into local main..."
          git merge upstream/main --ff-only

          echo "⬆️  Pushing updated main to origin (fork)..."
          git push origin main

          echo "🚀 Sync complete — Vercel deployment should trigger now."
